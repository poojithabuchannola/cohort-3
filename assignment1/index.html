<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pokemon Landing Page</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- white outer container -->
  <div class="main-container">

    <!-- actual landing page -->
    <div class="container">

      <!-- LEFT SIDE -->
      <div class="left">

        <!-- pokemon logo -->
        <img src="./Pokemon_logo.png" class="logo">

        <!-- text -->
        <div class="text-content">

          <p class="small-title">POKEMON GEN I</p>

          <h1 class="main-title">Pikachu</h1>

          <p class="description">
            Pikachu is an Electric-type Pokémon introduced
            in Generation I. Pikachu are small, chubby,
            and incredibly cute mouse-like Pokémon.
            They are almost completely covered by
            yellow fur.
          </p>

          <!-- counter -->
          <div class="counter">
            <span class="line"></span>
            <span>01 / 08</span>
          </div>

        </div>

        <!-- pokeball -->
        <div class="pokeball"></div>

      </div>

      <!-- RIGHT SIDE -->
      <div class="right">

        <!-- menu -->
        <div class="menu">☰</div>

        <!-- pikachu image -->
        <img src="./pikachu.png" class="pikachu">

        <!-- dots -->
        <div class="dots">
          <span class="active"></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
